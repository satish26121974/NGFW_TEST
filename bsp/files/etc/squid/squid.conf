############################################
# BASIC
############################################
visible_hostname unigr8ways
coredump_dir /var/spool/squid

#####################################
# DNS
#####################################
dns_nameservers 127.0.0.1

#####################################
# Extra headers for helpers
#####################################
url_rewrite_extras "%>a %un %>rm myip=%la myport=%lp"
store_id_extras "%>a %un %>rm myip=%la myport=%lp"

#####################################
# Group definitions (IP-based)
###############GROUPID_DATA_START######################
acl group1 src "/etc/squid/GROUP1.txt"
acl group2 src "/etc/squid/GROUP2.txt"
acl group3 src "/etc/squid/GROUP3.txt"
acl group4 src "/etc/squid/GROUP4.txt"
acl group5 src "/etc/squid/GROUP5.txt"
acl group6 src "/etc/squid/GROUP6.txt"
acl group7 src "/etc/squid/GROUP7.txt"
acl group8 src "/etc/squid/GROUP8.txt"
acl group9 src "/etc/squid/GROUP9.txt"
acl group10 src "/etc/squid/GROUP10.txt"
###############GROUPID_DATA_STOP######################

#####################################
# Ports and basic safety ACLs
#####################################
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 70
acl Safe_ports port 210
acl Safe_ports port 1025-65535
acl Safe_ports port 280
acl Safe_ports port 488
acl Safe_ports port 591
acl Safe_ports port 777
acl SafeMethods method GET HEAD CONNECT

host_verify_strict off

####################SSL_COMMON_WHITELIST_START###################
acl ssl_whitelist_common_domain ssl::server_name "/etc/squid/ssl-common-whitelist.txt"
acl ssl_whitelist_common_ip dst "/etc/squid/ssl-common-whitelistip.txt"
acl nolog_common_sites dstdomain "/etc/squid/nolog-common-sites.txt"
####################SSL_COMMON_WHITELIST_STOP###################

###############GROUPID_WL_DOMAIN_START######################
acl whitelist_group1 dstdomain "/etc/squid/group1-whitelist-domains.txt"
acl whitelist_group2 dstdomain "/etc/squid/group2-whitelist-domains.txt"
