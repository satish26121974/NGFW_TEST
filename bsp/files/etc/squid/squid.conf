# =============================================================================
# PORTS + SSL BUMP (CORRECT ORDER)
# =============================================================================

# HTTP intercept
http_port 3127
http_port 3128 intercept

# HTTPS intercept + certs (your existing)
https_port 3129 intercept ssl-bump \
    generate-host-certificates=on dynamic_cert_mem_cache_size=48MB \
    cert=/etc/squid/ssl_cert/myCA.pem \
    key=/etc/squid/ssl_cert/myCA.key

# sslcrtd FIRST (UNCOMMENT & FIX PATH)
sslcrtd_program /usr/lib/squid/security_file_certgen -s /tmp/squid/ssldb -M 4MB
sslcrtd_children 5 startup=1 idle=1

################ICAP_SERVER_START#####################
icap_enable on
icap_connect_timeout 5 seconds
icap_io_timeout 60 seconds
icap_send_client_ip on
icap_send_client_username on
icap_service service_avi_resp respmod_precache icap://127.0.0.1:1344/squidclamav bypass=on
icap_access deny CONNECT
icap_access service_avi_resp allow all
adaptation_access service_avi_resp allow all
acl range_req req_header Range .
http_access deny range_req
###############ICAP_SERVER_STOP#####################

acl eicartest ssl::server_name .eicar.org .secure.eicar.org .testwicar.eu .wicar.org
acl eicar_path urlpath_regex -i eicar|testwicar|virus

# CORRECT SINGLE ssl_bump block (AFTER ports + sslcrtd)
acl step1 at_step SslBump1
acl step2 at_step SslBump2
acl step3 at_step SslBump3

acl splice_critical ssl::server_name_regex -i \
    (google|googleapis|gstatic|gvt1|gvt2|googlevideo|ytimg|youtube|clients6\.google\.com) \
    (\.google\.com|\.googleapis\.com|\.gstatic\.com|\.gvt1\.com|\.gvt2\.com) \
    mail\.google\.com gmail\.com ssl\.gstatic\.com duckduckgo\.com cnergee\.com unigr8ways\.com bytescreentech\.com openapi\.com signaler-pa

acl splice_microsoft ssl::server_name_regex -i \
    self\.events\.data\.microsoft\.com

ssl_bump peek step1 all
ssl_bump bump eicartest
ssl_bump splice splice_critical splice_microsoft ssl_whitelist_common_domain ssl_whitelist_common_ip
ssl_bump terminate pornsnidomainlist group1sni group2sni group3sni group4sni group5sni group6sni group7sni group8sni group9sni group10sni
ssl_bump bump all

# =============================================================================
# HTTP ACCESS RULES (your existing httpaccess deny/allow blocks stay here)
# =============================================================================
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports  
http_access deny !SafeMethods

# Final deny

http_access deny all


